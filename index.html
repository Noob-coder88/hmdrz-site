<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>My Project</title>
</head>
<body style="margin: 0; padding: 0; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; background-color: #0a0a0a;">

    <div style="max-width: 800px; margin: 0 auto; padding: 2rem 1.5rem; min-height: 100vh; display: flex; flex-direction: column; justify-content: center;">

        <!-- کارت اصلی -->
        <div style="background-color: #1a1a1a; border-radius: 24px; padding: 2rem 1.8rem; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.5); border: 1px solid #2a2a2a;">
            
            <!-- آیکون یا نشانگر -->
            <div style="text-align: center; margin-bottom: 1rem;">
                <span style="font-size: 3rem;">🚀</span>
            </div>

            <!-- عنوان -->
            <h1 style="color: #f0f0f0; font-size: 2rem; margin: 0 0 0.5rem 0; text-align: center; font-weight: 600;">
                My First Project
            </h1>
            
            <p style="color: #b0b0b0; text-align: center; font-size: 1rem; border-bottom: 1px solid #2c2c2c; padding-bottom: 1.2rem;">
                A simple project I just started
            </p>

            <!-- دموی زنده -->
            <div style="background-color: #111; border-radius: 18px; padding: 1.2rem 1.5rem; margin: 1.5rem 0; border-left: 4px solid #3a86ff;">
                <p style="color: #ccc; margin: 0 0 6px 0; font-size: 0.85rem; letter-spacing: 1px;">🔗 LIVE DEMO</p>
                <a href="https://hmdrz.xyz" target="_blank" style="color: #6ea8fe; text-decoration: none; font-size: 1.2rem; font-weight: 500; word-break: break-all;">hmdrz.xyz</a>
                <p style="color: #7a7a7a; font-size: 0.8rem; margin: 8px 0 0 0;">Custom domain · Cloudflare hosting</p>
            </div>

            <!-- تکنولوژی‌ها -->
            <div style="margin: 1.5rem 0;">
                <h3 style="color: #e0e0e0; margin: 0 0 12px 0; font-size: 1.1rem;">🛠️ Tech Stack</h3>
                <div style="display: flex; flex-wrap: wrap; gap: 10px;">
                    <span style="background-color: #2a2a2a; color: #ddd; padding: 5px 14px; border-radius: 40px; font-size: 0.85rem;">HTML</span>
                    <span style="background-color: #2a2a2a; color: #ddd; padding: 5px 14px; border-radius: 40px; font-size: 0.85rem;">TailWind CSS</span>
                    <span style="background-color: #2a2a2a; color: #ddd; padding: 5px 14px; border-radius: 40px; font-size: 0.85rem;">Js</span>
                    <span style="background-color: #2a2a2a; color: #ddd; padding: 5px 14px; border-radius: 40px; font-size: 0.85rem;">Cloudflare</span>
                    <span style="background-color: #2a2a2a; color: #ddd; padding: 5px 14px; border-radius: 40px; font-size: 0.85rem;">GitHub</span>
                </div>
            </div>

            <!-- وضعیت -->
            <div style="background-color: #0f0f0f; border-radius: 16px; padding: 0.8rem 1.2rem; margin-top: 1rem; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;">
                <span style="display: inline-block; width: 10px; height: 10px; background-color: #4caf50; border-radius: 50%;"></span>
                <span style="color: #c0c0c0; font-size: 0.9rem;">Status: <strong style="color: #eee;">🚧 Under development</strong></span>
                <span style="margin-left: auto; color: #5a5a5a; font-size: 0.75rem;">v0.1</span>
            </div>

            <!-- فوتر کوچک -->
            <p style="text-align: center; color: #555; font-size: 0.7rem; margin-top: 2rem; border-top: 1px solid #232323; padding-top: 1.2rem;">
                Hosted on Cloudflare · Custom domain · GitHub
            </p>
        </div>
    </div>

</body>
</html>
